name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-latest
    env:
      HOMEBREW_NO_ENV_HINTS: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build and test
        run: scripts/ci-build-test.sh
