name: AI Code Review with xAI

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    name: Review
    runs-on: ubuntu-latest
    steps:
      - name: Code Review
        uses: tarmojussila/xai-code-review@v0.1.0
        with:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
