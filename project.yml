name: gridOS

options:
  bundleIdPrefix: com.aaldere1
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: 1.13.0

settings:
  base:
    CLANG_ANALYZER_NONNULL: YES
    CLANG_ANALYZER_NUMBER_OBJECT_CONVERSION: YES_AGGRESSIVE
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_VERSION: "6.0"

targets:
  gridOS:
    type: application
    platform: macOS
    sources:
      - path: Sources/GridOSApp
      - path: Assets.xcassets
    dependencies:
      - target: GridOSKit
      - target: TerminalCore
      - target: RenderCore
      - target: SystemMetrics
      - target: CommandIntelligence
      - target: Integrations
    info:
      path: Sources/GridOSApp/Info.plist
      properties:
        CFBundleDisplayName: gridOS
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.developer-tools
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHumanReadableCopyright: Copyright (c) 2026 gridOS Authors. All rights reserved.
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: NO
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 9
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: 1.0.1
        PRODUCT_BUNDLE_IDENTIFIER: com.aaldere1.gridos
        PRODUCT_NAME: gridOS

  GridOSKit:
    type: framework
    platform: macOS
    sources:
      - path: Sources/GridOSKit
    info:
      path: Sources/GridOSKit/Info.plist
      properties:
        CFBundleDisplayName: GridOSKit
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    settings:
      base:
        CURRENT_PROJECT_VERSION: 9
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: 1.0.1
        PRODUCT_BUNDLE_IDENTIFIER: com.aaldere1.gridos.GridOSKit

  TerminalCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/TerminalCore
    dependencies:
      - target: GridOSKit
      - package: SwiftTerm
    info:
      path: Sources/TerminalCore/Info.plist
      properties:
        CFBundleDisplayName: TerminalCore
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    settings:
      base:
        CURRENT_PROJECT_VERSION: 9
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: 1.0.1
        PRODUCT_BUNDLE_IDENTIFIER: com.aaldere1.gridos.TerminalCore

  RenderCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/RenderCore
    dependencies:
      - target: GridOSKit
    info:
      path: Sources/RenderCore/Info.plist
      properties:
        CFBundleDisplayName: RenderCore
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    settings:
      base:
        CURRENT_PROJECT_VERSION: 9
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: 1.0.1
        PRODUCT_BUNDLE_IDENTIFIER: com.aaldere1.gridos.RenderCore

  RenderCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/RenderCoreTests
    dependencies:
      - target: RenderCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.aaldere1.gridos.RenderCoreTests

  SystemMetrics:
    type: framework
    platform: macOS
    sources:
      - path: Sources/SystemMetrics
    dependencies:
      - target: GridOSKit
    info:
      path: Sources/SystemMetrics/Info.plist
      properties:
        CFBundleDisplayName: SystemMetrics
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    settings:
      base:
        CURRENT_PROJECT_VERSION: 9
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: 1.0.1
        PRODUCT_BUNDLE_IDENTIFIER: com.aaldere1.gridos.SystemMetrics

  SystemMetricsTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/SystemMetricsTests
    dependencies:
      - target: SystemMetrics
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.aaldere1.gridos.SystemMetricsTests

  CommandIntelligence:
    type: framework
    platform: macOS
    sources:
      - path: Sources/CommandIntelligence
    dependencies:
      - target: GridOSKit
    info:
      path: Sources/CommandIntelligence/Info.plist
      properties:
        CFBundleDisplayName: CommandIntelligence
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    settings:
      base:
        CURRENT_PROJECT_VERSION: 9
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: 1.0.1
        PRODUCT_BUNDLE_IDENTIFIER: com.aaldere1.gridos.CommandIntelligence

  CommandIntelligenceTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/CommandIntelligenceTests
    dependencies:
      - target: CommandIntelligence
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.aaldere1.gridos.CommandIntelligenceTests

  Integrations:
    type: framework
    platform: macOS
    sources:
      - path: Sources/Integrations
    dependencies:
      - target: GridOSKit
    info:
      path: Sources/Integrations/Info.plist
      properties:
        CFBundleDisplayName: Integrations
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    settings:
      base:
        CURRENT_PROJECT_VERSION: 9
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: 1.0.1
        PRODUCT_BUNDLE_IDENTIFIER: com.aaldere1.gridos.Integrations

  IntegrationsTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/IntegrationsTests
    dependencies:
      - target: Integrations
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.aaldere1.gridos.IntegrationsTests

  GridOSKitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/GridOSKitTests
    dependencies:
      - target: GridOSKit
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.aaldere1.gridos.GridOSKitTests

  TerminalCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/TerminalCoreTests
    dependencies:
      - target: TerminalCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.aaldere1.gridos.TerminalCoreTests

schemes:
  gridOS:
    build:
      targets:
        gridOS: all
        CommandIntelligenceTests: [test]
        GridOSKitTests: [test]
        IntegrationsTests: [test]
        RenderCoreTests: [test]
        SystemMetricsTests: [test]
        TerminalCoreTests: [test]
    test:
      gatherCoverageData: true
      targets:
        - CommandIntelligenceTests
        - GridOSKitTests
        - IntegrationsTests
        - RenderCoreTests
        - SystemMetricsTests
        - TerminalCoreTests
